name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: gcc-13
            cpp_compiler: g++-13
            build_type: Release
          - os: ubuntu-latest
            c_compiler: clang-17
            cpp_compiler: clang++-17
            build_type: Release
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Release
    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        
    - name: Install dependencies
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y libreadline-dev gcc-13 g++-13 clang-17
        elif [ "$RUNNER_OS" == "macOS" ]; then
          brew install readline
        fi

    - name: Build
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          g++ main.cpp -I$(brew --prefix readline)/include -L$(brew --prefix readline)/lib -lreadline
        else
          g++ main.cpp -lreadline
        fi

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
